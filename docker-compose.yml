services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"  # browser UI
      - "7687:7687"  # bolt neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-lassberg-dev-pw123}
      - NEO4J_PLUGINS=[]
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  oxigraph:
    image: oxigraph/oxigraph
    command: ["serve", "--location", "/data", "--bind", "0.0.0.0:7878"]
    ports:
      - "7878:7878"
    volumes:
      - oxigraph-data:/data

volumes:
  neo4j-data:
  oxigraph-data:
