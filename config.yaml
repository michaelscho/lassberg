paths:
  letters: data/letters
  register: data/register
  letters_register: data/register/lassberg-letters.xml

embedding:
  primary:
    name: BAAI/bge-m3
    dim: 1024
    normalize: true
    max_tokens: 8192
  secondary:            # optional, per Flag aktivieren
    name: Qwen/Qwen3-Embedding-0.6B
    enabled: false

clustering:
  umap: {n_neighbors: 10, min_dist: 0.1, metric: cosine, random_state: 42}
  hdbscan: {min_cluster_size: 3, min_samples: 2, cluster_selection_method: eom}

# Explore-Seite (html/explore.html + js/explore/, Artefakte in json/explore/);
frontend:
  matryoshka_dim: 512   # Dimension für Browser-Vektoren (BGE-M3: einfaches Truncate+Renorm testen; Fallback: volle 1024)
  quantization: int8
  browser_model: Xenova/bge-m3   # ONNX-Konvertierung für Transformers.js
  browser_model_dtype: q8        # q8 (~560 MB) oder fp16 (~1,1 GB); Konsistenztest entscheidet
  hf_api_fallback: true          # optionaler Fallback ohne Modell-Download
  letter_url_pattern: html/letters/lassberg-letter-{id}.html   # bestehende HTML-Briefansichten des Repos

rdf:
  base_uri: https://michaelscho.github.io/lassberg/

neo4j:
  uri: bolt://localhost:7687
  user: neo4j

sparql:
  endpoint: http://localhost:7878/query
