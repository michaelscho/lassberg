paths:
  letters: data/letters
  register: data/register
  letters_register: data/register/lassberg-letters.xml

embedding:
  # Passage-level chunking for the search index (2026-07-15): letters are split into overlapping
  # token windows before embedding, rather than pooled into one vector per letter, so search can
  # surface (and the UI can show) the specific matching passage instead of just "here's a whole
  # letter". Short letters (the corpus majority - typically a single paragraph) fall under
  # chunk_tokens anyway and end up as exactly one chunk, same as before. A per-letter aggregate
  # (mean of its chunk vectors, renormalized) is still written for scripts/cluster.py and
  # scripts/export_related.py, which want one vector per letter, not per model/mode change needed
  # in either.
  chunk_tokens: 300
  chunk_overlap_tokens: 60
  # pooling/query_instruction are consumed client-side only (js/explore/search.js, via the
  # exported embedding_models.json manifest) - embed.py's corpus-side encoding always uses each
  # backend's own default (no instruction prefix; that's a query-time-only device, see the Qwen3
  # model cards' "no need to add instruction for retrieval documents").
  models:
    bge-m3:
      name: BAAI/bge-m3
      backend: bge-m3            # scripts/embed.py: BgeM3Backend (FlagEmbedding, CLS pooling)
      dim: 1024
      max_tokens: 8192
      enabled: true
      browser_local: true        # offer the Transformers.js in-browser download path
      onnx_repo: Xenova/bge-m3
      pooling: cls
      query_instruction: ""
    qwen3-0.6b:
      name: Qwen/Qwen3-Embedding-0.6B
      backend: sentence-transformers   # last-token pooling + query instruction, see model card
      dim: 1024
      max_tokens: 32768
      enabled: true
      browser_local: true
      onnx_repo: onnx-community/Qwen3-Embedding-0.6B-ONNX
      pooling: last_token
      query_instruction: "Instruct: Given a search query about a 19th-century German scholarly correspondence, retrieve relevant letter passages\nQuery:"
    qwen3-4b:
      name: Qwen/Qwen3-Embedding-4B
      backend: sentence-transformers
      dim: 2560
      max_tokens: 40960
      enabled: true
      browser_local: false       # too large for a browser download - HF Inference API only
      onnx_repo: null
      pooling: last_token
      query_instruction: "Instruct: Given a search query about a 19th-century German scholarly correspondence, retrieve relevant letter passages\nQuery:"

clustering:
  umap: {n_neighbors: 10, min_dist: 0.1, metric: cosine, random_state: 42}
  hdbscan: {min_cluster_size: 3, min_samples: 2, cluster_selection_method: eom}

# Explore-Seite (html/explore.html + js/explore/, Artefakte in json/explore/);
frontend:
  matryoshka_dim: 512   # Dimension für Browser-Vektoren (nur bge-m3: einfaches Truncate+Renorm
                         # getestet; Qwen3-Modelle behalten stets ihre volle Dimension, s. u.)
  quantization: int8
  hf_api_fallback: true          # optionaler Fallback ohne Modell-Download
  letter_url_pattern: html/letters/lassberg-letter-{id}.html   # bestehende HTML-Briefansichten des Repos

rdf:
  base_uri: https://michaelscho.github.io/lassberg/

neo4j:
  uri: bolt://localhost:7687
  user: neo4j

sparql:
  endpoint: http://localhost:7878/query
